# ~/.config/hypr/hyprland.conf - rice base
# Modifier convention: ALT.

### MONITOR ###
monitor = , preferred, auto, 1

### PROGRAMS ###
$terminal = env LIBGL_ALWAYS_SOFTWARE=1 kitty
$menu     = wofi --show drun
$run      = wofi --show run
$power    = ~/.local/bin/wofi-power

### AUTOSTART ###
exec-once = hyprpaper
exec-once = waybar
exec-once = mako

### ENV ###
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,capitaine-cursors-light

### LOOK & FEEL ###
general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(d46a4eee)
    col.inactive_border = rgba(a8c4caaa)
    layout = dwindle
}

decoration {
    rounding = 4
    blur {
        enabled = false
        size = 2
        passes = 1
    }
}

animations {
    enabled = true

    # Calm easing for everything that should stay still.
    bezier = calm, 0.05, 0.9, 0.1, 1.0
    # The one suspended event: an overshooting "splash" as a window bursts into place,
    # a nod to A Bigger Splash. Movement lives only here; the rest of the desktop stays still.
    bezier = splash, 0.34, 1.56, 0.64, 1.0

    animation = windowsIn,   1, 6, splash, popin 82%
    animation = windowsOut,  1, 4, calm,   popin 92%
    animation = windowsMove, 1, 5, calm
    animation = fade,        1, 7, calm
    animation = workspaces,  1, 6, calm
}

dwindle {
    preserve_split = true
    # Always split toward the right/bottom instead of guessing from window shape,
    # so new windows land predictably instead of spiralling.
    force_split = 2
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

### WINDOW RULES ###
windowrule = float 1,  match:class ^(wofi)$
windowrule = center 1, match:class ^(wofi)$
windowrule = size 560 380, match:class ^(wofi)$

# Open Kitty floating in the bottom left at a golden ratio size (610x377, using Fibonacci numbers)
windowrule = float 1, match:class ^(floating_kitty)$
windowrule = size 610 377, match:class ^(floating_kitty)$
windowrule = move 12 411, match:class ^(floating_kitty)$

# Rice showcase: a fixed floating composition over the wallpaper for screenshots.
# Summon/dismiss with the rice-showcase script (Alt+Shift+S). Coordinates are for 1280x800.
windowrule = float 1, match:class ^(rice_fetch)$
windowrule = size 500 300, match:class ^(rice_fetch)$
windowrule = move 90 110, match:class ^(rice_fetch)$

windowrule = float 1, match:class ^(rice_files)$
windowrule = size 500 300, match:class ^(rice_files)$
windowrule = move 90 440, match:class ^(rice_files)$

windowrule = float 1, match:class ^(rice_btop)$
windowrule = size 540 430, match:class ^(rice_btop)$
windowrule = move 660 150, match:class ^(rice_btop)$

windowrule = float 1, match:class ^(rice_cava)$
windowrule = size 470 180, match:class ^(rice_cava)$
windowrule = move 690 600, match:class ^(rice_cava)$

input {
    kb_layout = gb
    kb_variant = mac
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        scroll_factor = 0.5
    }
}

device {
    name = qemu-qemu-usb-mouse
    natural_scroll = true
}

device {
    name = qemu-qemu-usb-tablet
    natural_scroll = true
}

# Keep the numbered workspaces alive so Waybar can show them consistently.
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true

### KEYBINDS ###
$mainMod = ALT

bind = $mainMod, Q, exec, $terminal
bind = $mainMod SHIFT, Q, exec, env LIBGL_ALWAYS_SOFTWARE=1 kitty --class floating_kitty
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $menu
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $run
bind = $mainMod, P, exec, $power
bind = $mainMod SHIFT, S, exec, ~/.local/bin/rice-showcase
bind = $mainMod, F, fullscreen,
bind = $mainMod, J, layoutmsg, togglesplit
# Pseudotile: keep the active window's floating size inside its tile slot
bind = $mainMod, T, pseudo,

# Move focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Move / swap the active window in a direction
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Resize the active window (binde = repeats while held)
binde = $mainMod CTRL, left,  resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, up,    resizeactive, 0 -40
binde = $mainMod CTRL, down,  resizeactive, 0 40

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Mouse window management
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
