# ~/.config/hypr/hyprland.conf - rice base
# Modifier convention: ALT.

### MONITOR ###
monitor = , preferred, auto, 1

### PROGRAMS ###
$terminal = env LIBGL_ALWAYS_SOFTWARE=1 kitty
$menu     = wofi --show drun
$run      = wofi --show run
$power    = ~/.local/bin/wofi-power

### AUTOSTART ###
exec-once = hyprpaper
exec-once = waybar
exec-once = mako

### ENV ###
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,capitaine-cursors-light

### LOOK & FEEL ###
general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(d46a4eee)
    col.inactive_border = rgba(a8c4caaa)
    layout = dwindle
}

decoration {
    rounding = 4
    blur {
        enabled = false
        size = 2
        passes = 1
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

### WINDOW RULES ###
windowrule = float 1,  match:class ^(wofi)$
windowrule = center 1, match:class ^(wofi)$
windowrule = size 560 380, match:class ^(wofi)$

# Open Kitty floating in the bottom left at a golden ratio size (610x377, using Fibonacci numbers)
windowrule = float 1, match:class ^(floating_kitty)$
windowrule = size 610 377, match:class ^(floating_kitty)$
windowrule = move 12 411, match:class ^(floating_kitty)$

input {
    kb_layout = gb
    kb_variant = mac
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        scroll_factor = 0.5
    }
}

device {
    name = qemu-qemu-usb-mouse
    natural_scroll = true
}

device {
    name = qemu-qemu-usb-tablet
    natural_scroll = true
}

# Keep the numbered workspaces alive so Waybar can show them consistently.
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true

### KEYBINDS ###
$mainMod = ALT

bind = $mainMod, Q, exec, $terminal
bind = $mainMod SHIFT, Q, exec, env LIBGL_ALWAYS_SOFTWARE=1 kitty --class floating_kitty
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $menu
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $run
bind = $mainMod, P, exec, $power
bind = $mainMod, F, fullscreen,
bind = $mainMod, J, layoutmsg, togglesplit

# Move focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Mouse window management
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
