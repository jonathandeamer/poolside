# ncspot — poolside (A Bigger Splash) theme.
#
# First run: launch `ncspot` and complete the Spotify OAuth browser prompt
# (Premium is required for playback). Audio plays through the default PipeWire
# sink, so cava picks it up automatically.
#
# The Arch Linux ARM repo package is currently old enough to fail after
# "Connecting to Spotify"; use a current ncspot build when that happens.

notify = true
gapless = true

[theme]
background = "#fcfaf6"
primary = "#23313a"
secondary = "#6b7d88"
title = "#c25438"
playing = "#c25438"
playing_selected = "#b04a30"
playing_bg = "#fcfaf6"
highlight = "#23313a"
highlight_bg = "#ddecf4"
highlight_inactive_bg = "#e3ded6"
error = "#fcfaf6"
error_bg = "#c25438"
statusbar = "#fcfaf6"
statusbar_progress = "#c25438"
statusbar_progress_bg = "#e3ded6"
statusbar_bg = "#3d7590"
cmdline = "#23313a"
cmdline_bg = "#fcfaf6"
search_match = "#cf9a24"
