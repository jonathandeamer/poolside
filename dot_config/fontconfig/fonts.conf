<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Enable antialiasing -->
  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <!-- Enable slight hinting (best for modern sans-serifs like Inter) -->
  <match target="font">
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintmedium</const>
    </edit>
  </match>

  <!-- Grayscale AA — subpixel rendering is unreliable in a VM -->
  <match target="font">
    <edit name="rgba" mode="assign">
      <const>none</const>
    </edit>
  </match>

  <!-- Reject the variable version of Inter (renders fuzzy/jagged on standard DPI) -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family">
          <string>Inter Variable</string>
        </patelt>
      </pattern>
    </rejectfont>
  </selectfont>
</fontconfig>
