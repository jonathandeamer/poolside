# ~/.config/kitty/kitty.conf
# Kitty configuration for the Hockney Tribute Aesthetic.
# Clean, sunlit, and legible with flat color planes.

# --- Font Configuration ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Window Layout & Padding ---
# Staged, clean layout with spacious margins
window_padding_width 14 14 18 16
confirm_os_window_close 0

# --- Tab Bar ---
tab_bar_style               powerline
tab_powerline_style         angled
active_tab_font_style       bold
inactive_tab_font_style     normal

# --- Scrollback ---
scrollback_lines 5000

# --- Mouse & Cursor ---
cursor_shape block
cursor_blink_interval 0
detect_urls yes

# ==========================================
# Hockney Tribute Color Scheme
# ==========================================

# --- LIGHT THEME (Default) ---
# Emulates sitting poolside in sharp afternoon California light.
# Flat, sun-bleached stucco background with high-contrast slate text.

foreground            #23313a
background            #fcfaf6
selection_foreground  #23313a
selection_background  #ddecf4

# Cursor
cursor                #c96244
cursor_text_color     #fcfaf6

# Tab bar colors
active_tab_foreground   #fcfaf6
active_tab_background   #c96244
inactive_tab_foreground #7c8e9a
inactive_tab_background #e3ded6

# URL underline color
url_color             #3d7590

# The 16 terminal colors

# Black (Slate/Charcoal)
color0  #23313a
color8  #7c8e9a

# Red (Coral/Terracotta/Rust)
color1  #c96244
color9  #d46a4e

# Green (Lawn & Palm Green)
color2  #5a8f66
color10 #76a881

# Yellow (Warm Ochre / Sunlight)
color3  #cf9a24
color11 #f6cb4f

# Blue (Sky & Pool Blue)
color4  #3d7590
color12 #5a9ec2

# Magenta (Stucco Pink / Dusty Rose)
color5  #8f5d88
color13 #d99cb9

# Cyan (Pool Cyan/Turquoise)
color6  #2d808a
color14 #54b5c2

# White (Concrete / Stucco)
color7  #e3ded6
color15 #fcfaf6


# --- DARK THEME OPTION ---
# If you prefer a dark terminal workspace, uncomment the section below
# and comment out the Light Theme colors above.
#
